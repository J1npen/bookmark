{% load static %}
<!DOCTYPE html>
<html lang="zh-CN" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>完成注册 — 书签</title>
<link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
<link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
<link rel="apple-touch-icon" href="{% static 'apple-touch-icon.png' %}">
<style>
  :root {
    --bg-page:   #f5f6fa;
    --bg-card:   #ffffff;
    --text-main: #1a1a2e;
    --text-muted:#666;
    --border:    #e2e4ec;
    --accent:    #4f6ef7;
    --accent-h:  #3a57d6;
    --input-bg:  #ffffff;
    --success:   #16a34a;
    --success-bg:#f0fdf4;
    --success-bd:#bbf7d0;
  }
  [data-theme="dark"] {
    --bg-page:   #0f1117;
    --bg-card:   #1c1e27;
    --text-main: #e8eaf6;
    --text-muted:#9ea3b8;
    --border:    #2e3145;
    --input-bg:  #1c1e27;
    --success-bg:#052e16;
    --success-bd:#166534;
  }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) {
      --bg-page:   #0f1117;
      --bg-card:   #1c1e27;
      --text-main: #e8eaf6;
      --text-muted:#9ea3b8;
      --border:    #2e3145;
      --input-bg:  #1c1e27;
      --success-bg:#052e16;
      --success-bd:#166534;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg-page);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    width: 100%;
    max-width: 380px;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .notice {
    border-radius: 8px;
    padding: .7rem .9rem;
    font-size: .875rem;
    margin-bottom: 1.25rem;
  }
  .notice.success {
    background: var(--success-bg);
    border: 1px solid var(--success-bd);
    color: var(--success);
  }
  .notice.error {
    background: #fee2e2;
    border: 1px solid #fca5a5;
    color: #b91c1c;
  }
  [data-theme="dark"] .notice.error,
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) .notice.error {
      background: #3b1515;
      color: #fca5a5;
      border-color: #7f1d1d;
    }
  }
  label {
    display: block;
    font-size: .875rem;
    color: var(--text-muted);
    margin-bottom: .3rem;
  }
  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: .6rem .8rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-main);
    font-size: 1rem;
    margin-bottom: 1rem;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--accent); }
  button[type="submit"] {
    width: 100%;
    padding: .7rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
  }
  button[type="submit"]:hover { background: var(--accent-h); }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 1rem;
    font-size: .875rem;
    color: var(--text-muted);
    text-decoration: none;
  }
  .back-link:hover { color: var(--accent); }
</style>
<script>
  (function(){
    var s = localStorage.getItem('theme');
    if (s) document.documentElement.setAttribute('data-theme', s);
  })();
</script>
</head>
<body>
<div class="card">
  <h1>书签</h1>

  {% if error %}
    <div class="notice error">{{ error }}</div>
    <a href="{% url 'login' %}" class="back-link">← 返回登录</a>

  {% elif paid %}
    <div class="notice success">支付成功！请设置您的账号信息。</div>

    {% if reg_error %}
      <div class="notice error">{{ reg_error }}</div>
    {% endif %}

    <form method="post" action="{% url 'payment:do_register' %}">
      {% csrf_token %}
      <input type="hidden" name="out_trade_no" value="{{ out_trade_no }}">

      <label for="id_username">用户名</label>
      <input type="text" id="id_username" name="username"
             value="{{ prev_username|default:'' }}"
             autocomplete="username" autofocus>

      <label for="id_password1">密码（至少 6 位）</label>
      <input type="password" id="id_password1" name="password1"
             autocomplete="new-password">

      <label for="id_password2">确认密码</label>
      <input type="password" id="id_password2" name="password2"
             autocomplete="new-password">

      <button type="submit">完成注册并登录</button>
    </form>

  {% endif %}
</div>
</body>
</html>
