{% load static %}
<!DOCTYPE html>
<html lang="zh-CN" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>登录 — 书签</title>
<link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
<link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
<link rel="apple-touch-icon" href="{% static 'apple-touch-icon.png' %}">
<style>
  :root {
    --bg-page:   #f5f6fa;
    --bg-card:   #ffffff;
    --text-main: #1a1a2e;
    --text-muted:#666;
    --border:    #e2e4ec;
    --accent:    #4f6ef7;
    --accent-h:  #3a57d6;
    --input-bg:  #ffffff;
  }
  [data-theme="dark"] {
    --bg-page:   #0f1117;
    --bg-card:   #1c1e27;
    --text-main: #e8eaf6;
    --text-muted:#9ea3b8;
    --border:    #2e3145;
    --accent:    #6b84fa;
    --accent-h:  #8fa0fb;
    --input-bg:  #1c1e27;
  }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) {
      --bg-page:   #0f1117;
      --bg-card:   #1c1e27;
      --text-main: #e8eaf6;
      --text-muted:#9ea3b8;
      --border:    #2e3145;
      --accent:    #6b84fa;
      --accent-h:  #8fa0fb;
      --input-bg:  #1c1e27;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg-page);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    width: 100%;
    max-width: 360px;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    text-align: center;
    color: var(--text-main);
  }
  .error {
    background: #fee2e2;
    color: #b91c1c;
    border-radius: 6px;
    padding: .6rem .8rem;
    font-size: .875rem;
    margin-bottom: 1rem;
  }
  [data-theme="dark"] .error,
  @media (prefers-color-scheme: dark) {
    html:not([data-theme="light"]) .error {
      background: #3b1515;
      color: #fca5a5;
    }
  }
  label {
    display: block;
    font-size: .875rem;
    color: var(--text-muted);
    margin-bottom: .3rem;
  }
  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: .6rem .8rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-main);
    font-size: 1rem;
    margin-bottom: 1rem;
    outline: none;
    transition: border-color .15s;
  }
  input:focus {
    border-color: var(--accent);
  }
  button[type="submit"] {
    width: 100%;
    padding: .7rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
  }
  button[type="submit"]:hover {
    background: var(--accent-h);
  }
</style>
<script>
  (function(){
    var s = localStorage.getItem('theme');
    if (s) document.documentElement.setAttribute('data-theme', s);
  })();
</script>
</head>
<body>
<div class="card">
  <h1>书签</h1>
  {% if form.errors %}
  <div class="error">用户名或密码错误，请重试。</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <label for="id_username">用户名</label>
    <input type="text" id="id_username" name="username" autofocus autocomplete="username">
    <label for="id_password">密码</label>
    <input type="password" id="id_password" name="password" autocomplete="current-password">
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit">登录</button>
  </form>
</div>
</body>
</html>
